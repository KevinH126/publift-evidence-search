name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (vet, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: go test
        run: go test ./... -v -cover

  python:
    name: Python sidecar (ruff, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedder-sidecar
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: embedder-sidecar/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: ruff check
        run: ruff check .

      - name: pytest
        run: |
          set +e
          pytest -v
          code=$?
          set -e
          if [ $code -eq 5 ]; then
            echo "No tests collected yet, skipping"
            exit 0
          fi
          exit $code
